database:
  mode: sqlite
  sqlite_path: incident_db.sqlite
  trino:
    host: "localhost"
    port: 8080
    catalog: "hive"
    schema: "incident"
    user: "analyst"

paths:
  template: "report_template.docx"
  output_reports: "output/reports"
  output_csv: "output/csv"
  logs: "logs/report_module.log"

report:
  air_speed_min: 0.5
  air_speed_max: 4.0
  ch4_columns: 3

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
